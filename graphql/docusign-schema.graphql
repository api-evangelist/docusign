# ─────────────────────────────────────────────
# Root Query / Mutation / Subscription
# ─────────────────────────────────────────────

type Query {
  # Envelopes
  envelope(accountId: String!, envelopeId: String!): Envelope
  envelopes(accountId: String!, fromDate: DateTime, toDate: DateTime, status: EnvelopeStatus, searchText: String): [Envelope]
  envelopeDocuments(accountId: String!, envelopeId: String!): [Document]
  envelopeRecipients(accountId: String!, envelopeId: String!): RecipientSet
  envelopeTabs(accountId: String!, envelopeId: String!, recipientId: String!): TabSet

  # Templates
  template(accountId: String!, templateId: String!): Template
  templates(accountId: String!, searchText: String, folder: String, sharedByMe: Boolean): [Template]
  templateRecipients(accountId: String!, templateId: String!): RecipientSet
  templateTabs(accountId: String!, templateId: String!, recipientId: String!): TabSet

  # Folders
  folder(accountId: String!, folderId: String!): Folder
  folders(accountId: String!): [Folder]

  # Bulk Send
  bulkSendList(accountId: String!, bulkSendListId: String!): BulkSend
  bulkSendLists(accountId: String!): [BulkSend]
  bulkSendBatch(accountId: String!, bulkSendBatchId: String!): BulkSendBatch
  bulkSendBatches(accountId: String!): [BulkSendBatch]

  # Connect
  connectConfiguration(accountId: String!, connectId: String!): Connect
  connectConfigurations(accountId: String!): [Connect]
  connectLogs(accountId: String!): [ConnectLog]

  # PowerForms
  powerForm(accountId: String!, powerFormId: String!): PowerForm
  powerForms(accountId: String!): [PowerForm]

  # Account & Users
  account(accountId: String!): AccountInfo
  user(accountId: String!, userId: String!): UserInfo
  users(accountId: String!): [UserInfo]

  # Branding
  brand(accountId: String!, brandId: String!): BrandLogo
  brands(accountId: String!): [BrandLogo]

  # Cloud Storage
  cloudStorageProviders(accountId: String!, userId: String!): [CloudStorageProvider]
}

type Mutation {
  # Envelopes
  createEnvelope(accountId: String!, envelope: JSON!): EnvelopeSummary
  updateEnvelope(accountId: String!, envelopeId: String!, envelope: JSON!): EnvelopeSummary
  voidEnvelope(accountId: String!, envelopeId: String!, voidedReason: String!): EnvelopeSummary
  deleteEnvelope(accountId: String!, envelopeIds: [String]!): JSON
  resendEnvelope(accountId: String!, envelopeId: String!): EnvelopeSummary

  # Recipients
  addRecipients(accountId: String!, envelopeId: String!, recipients: JSON!): RecipientSet
  updateRecipients(accountId: String!, envelopeId: String!, recipients: JSON!): RecipientSet
  deleteRecipients(accountId: String!, envelopeId: String!, recipients: JSON!): RecipientSet

  # Tabs
  addTabs(accountId: String!, envelopeId: String!, recipientId: String!, tabs: JSON!): TabSet
  updateTabs(accountId: String!, envelopeId: String!, recipientId: String!, tabs: JSON!): TabSet
  deleteTabs(accountId: String!, envelopeId: String!, recipientId: String!, tabs: JSON!): TabSet

  # Templates
  createTemplate(accountId: String!, template: JSON!): Template
  updateTemplate(accountId: String!, templateId: String!, template: JSON!): Template
  deleteTemplate(accountId: String!, templateId: String!): JSON

  # Bulk Send
  createBulkSendList(accountId: String!, bulkSend: JSON!): BulkSend
  sendBulkEnvelopes(accountId: String!, bulkSendListId: String!, envelopeOrTemplateId: String!): BulkSendBatch

  # Connect
  createConnectConfiguration(accountId: String!, connect: JSON!): Connect
  updateConnectConfiguration(accountId: String!, connectId: String!, connect: JSON!): Connect
  deleteConnectConfiguration(accountId: String!, connectId: String!): JSON
  retryConnectFailures(accountId: String!, envelopeIds: [String]!): JSON

  # PowerForms
  createPowerForm(accountId: String!, powerForm: JSON!): PowerForm
  updatePowerForm(accountId: String!, powerFormId: String!, powerForm: JSON!): PowerForm
  deletePowerForm(accountId: String!, powerFormIds: [String]!): JSON
}

type Subscription {
  envelopeStatusChanged(accountId: String!, envelopeId: String): Envelope
  recipientStatusChanged(accountId: String!, envelopeId: String!): RecipientSet
}
