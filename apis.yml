        type: Rate Limits
      - url: https://developers.docusign.com/docs/admin-api/sdks/
        type: SDKs
    description: >-
      The Docusign Admin API enables organizations to automate and programmatically
      execute administrative tasks for their Docusign accounts. It provides
      capabilities for managing organizations, accounts, and users, including user
      provisioning, permission management, and account configuration at scale.
  - aid: docusign:docusign-click-api
    name: Docusign Click API
    tags:
      - Clickwrap
      - Compliance
      - Consent
      - Terms of Service
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/clickapi
    humanURL: https://developers.docusign.com/docs/click-api/
    properties:
      - url: https://developers.docusign.com/docs/click-api/reference/
        type: Documentation
      - url: openapi/docusign-click-openapi-original.yml
        type: OpenAPI
      - url: https://developers.docusign.com/docs/click-api/click101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/click-api/how-to/
        type: How-To
      - url: https://developers.docusign.com/docs/click-api/click101/rules-and-limits/
        type: Rate Limits
      - url: https://developers.docusign.com/docs/click-api/sdks/
        type: SDKs
    description: >-
      The Docusign Click API enables developers to implement and manage elastic
      templates (clickwraps) to capture customer consent to standard agreement
      terms with a single click. It supports terms and conditions, terms of
      service, terms of use, privacy policies, and more, with Docusign handling
      the rendering and acceptance tracking.
  - aid: docusign:docusign-maestro-api
    name: Docusign Maestro API
    tags:
      - Automation
      - Orchestration
      - Workflows
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/aow-manage
    humanURL: https://developers.docusign.com/docs/maestro-api/
    properties:
      - url: https://developers.docusign.com/docs/maestro-api/reference/
        type: Documentation
      - url: openapi/docusign-maestro-openapi-original.yml
        type: OpenAPI
      - url: https://developers.docusign.com/docs/maestro-api/maestro101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/maestro-api/how-to/
        type: How-To
    description: >-
      The Docusign Maestro API allows developers to create, control, and integrate
      agreement workflows with their systems. It connects tools and data across
      workflows to automatically generate documents and agreements for review,
      approval, and signature, providing greater flexibility to manage agreements
      programmatically.
  - aid: docusign:docusign-monitor-api
    name: Docusign Monitor API
    tags:
      - Audit
      - Events
      - Monitoring
      - Security
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://lens-d.docusign.net
    humanURL: https://developers.docusign.com/docs/monitor-api/
    properties:
      - url: https://developers.docusign.com/docs/monitor-api/reference/
        type: Documentation
      - url: openapi/docusign-monitor-openapi-original.yml
        type: OpenAPI
      - url: https://developers.docusign.com/docs/monitor-api/monitor101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/monitor-api/how-to/
        type: How-To
    description: >-
      The Docusign Monitor API helps organizations protect their agreements with
      round-the-clock activity tracking. It receives a data feed containing
      security events for Docusign accounts, enabling integration with security
      information and event management (SIEM) systems and other monitoring
      applications.
  - aid: docusign:docusign-rooms-api
    name: Docusign Rooms API
    tags:
      - Collaboration
      - Mortgages
      - Real Estate
      - Transactions
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.rooms.docusign.com/restapi
    humanURL: https://developers.docusign.com/docs/rooms-api/
    properties:
      - url: https://developers.docusign.com/docs/rooms-api/reference/
        type: Documentation
      - url: openapi/docusign-rooms-openapi-original.yml
        type: OpenAPI
      - url: https://developers.docusign.com/docs/rooms-api/rooms101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/rooms-api/how-to/
        type: How-To
      - url: https://developers.docusign.com/docs/rooms-api/rooms101/rules-and-limits/
        type: Rate Limits
      - url: https://developers.docusign.com/docs/rooms-api/sdks/
        type: SDKs
    description: >-
      The Docusign Rooms API enables developers to streamline complex agreements
      with multiple parties, tasks, documents, and stages through secure digital
      workspaces. It supports real estate and mortgage transactions by bringing
      each party together in a central location where you can manage transactions,
      integrate with other Docusign functionality, and track each step of the
      process.
  - aid: docusign:docusign-web-forms-api
    name: Docusign Web Forms API
    tags:
      - Data Collection
      - Documents
      - Forms
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/webforms
    humanURL: https://developers.docusign.com/docs/web-forms-api/
    properties:
      - url: https://developers.docusign.com/docs/web-forms-api/reference/
        type: Documentation
      - url: https://developers.docusign.com/docs/web-forms-api/web-forms-101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/web-forms-api/how-to/
        type: How-To
    description: >-
      The Docusign Web Forms API facilitates generating semantic HTML forms around
      everyday contracts. It enables developers to embed and prefill forms from the
      systems they control, creating web form configurations and instances that
      streamline data collection and agreement workflows.
  - aid: docusign:docusign-notary-api
    name: Docusign Notary API
    tags:
      - Legal
      - Notarization
      - Remote Online Notary
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/restapi
    humanURL: https://developers.docusign.com/docs/notary-api/
    properties:
      - url: https://developers.docusign.com/docs/notary-api/
        type: Documentation
      - url: https://developers.docusign.com/docs/notary-api/notary101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/notary-api/how-to/
        type: How-To
      - url: https://developers.docusign.com/docs/notary-api/notary101/rules-and-limits/
        type: Rate Limits
    description: >-
      The Docusign Notary API enables developers to manage remote online notary
      tasks programmatically. It provides capabilities for sending signature
      requests to notary groups, managing notary on-demand sessions, and
      integrating remote online notarization functionality into applications.
  - aid: docusign:docusign-navigator-api
    name: Docusign Navigator API
    tags:
      - Agreements
      - AI
      - Analytics
      - Insights
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/navigator
    humanURL: https://developers.docusign.com/docs/navigator-api/
    properties:
      - url: https://developers.docusign.com/docs/navigator-api/reference/
        type: Documentation
      - url: https://developers.docusign.com/docs/navigator-api/concepts/
        type: Getting Started
      - url: https://developers.docusign.com/docs/navigator-api/how-to/
        type: How-To
    description: >-
      The Docusign Navigator API offers developers access to AI-extracted data
      from the Navigator smart agreement repository. It provides capabilities
      to analyze existing agreements, extract insights, and connect agreement
      data to business systems, enabling bulk ingestion of documents and
      retrieval of AI-analyzed agreement information.
  - aid: docusign:docusign-workspaces-api
    name: Docusign Workspaces API
    tags:
      - Agreements
      - Collaboration
      - Workspaces
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/restapi
