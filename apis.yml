        type: Getting Started
      - url: https://developers.docusign.com/docs/workspaces-api/how-to/create-workspace/
        type: How-To
      - url: https://developers.docusign.com/docs/workspaces-api/go-live/
        type: Go Live
    description: >-
      The Docusign Workspaces API allows developers to create, manage, and
      integrate Docusign Workspaces into their own applications, enabling
      structured, secure, and scalable agreement workflows. It provides
      capabilities for managing complex agreements with multiple parties
      and stages in a centralized digital environment.
  - aid: docusign:docusign-clm-api
    name: Docusign CLM API
    tags:
      - Contract Lifecycle Management
      - Documents
      - Workflows
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://developers.docusign.com/docs/clm-api/
    properties:
      - url: https://developers.docusign.com/docs/clm-api/reference/
        type: Documentation
      - url: https://developers.docusign.com/docs/clm-api/clm101/
        type: Getting Started
      - url: https://developers.docusign.com/docs/clm-api/clm101/rules-and-limits/
        type: Rate Limits
      - url: https://developers.docusign.com/docs/clm-api/clm101/auth/
        type: Authentication
    description: >-
      The Docusign CLM API enables developers to integrate contract lifecycle
      management workflow, document generation, and document management into
      Salesforce and custom applications. It provides access to Docusign CLM
      object, task, and content APIs for managing the full contract lifecycle
      programmatically.
  - aid: docusign:docusign-connected-fields-api
    name: Docusign Connected Fields API
    tags:
      - Data Verification
      - Extensions
      - Fields
      - Validation
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://demo.docusign.net/restapi
    humanURL: https://developers.docusign.com/docs/connected-fields-api/
    properties:
      - url: https://developers.docusign.com/docs/connected-fields-api/reference/
        type: Documentation
      - url: https://developers.docusign.com/docs/connected-fields-api/concepts/
        type: Getting Started
      - url: https://developers.docusign.com/docs/connected-fields-api/send-envelope-with-data-verification-fields/
        type: How-To
    description: >-
      The Docusign Connected Fields API enables developers to validate envelope
      field data programmatically. It allows integration with extension apps to
      verify custom data in real-time within eSignature agreements, supporting
      data verification workflows that connect to external systems of record.
