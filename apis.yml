      The Docusign Click API enables developers to implement and manage elastic templates (clickwraps) to capture
      customer consent to standard agreement terms with a single click. It supports terms and conditions, terms of
      service, terms of use, privacy policies, and more, with Docusign handling the rendering and acceptance tracking.
  - aid: docusign:docusign-maestro-api
