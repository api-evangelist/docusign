naftiko: 1.0.0-alpha2
info:
  label: DocuSign REST API — EnvelopeFormData
  description: 'DocuSign REST API — EnvelopeFormData. 1 operations. Lead operation: Docusign Returns envelope form data for
    an existing envelope.. Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - EnvelopeFormData
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: docusign-envelopeformdata
    baseUri: https://www.docusign.net/restapi
    description: DocuSign REST API — EnvelopeFormData business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-accountId-envelopes-envelopeId-form_data
      path: /v2/accounts/{accountId}/envelopes/{envelopeId}/form_data
      operations:
      - name: formdatagetformdata
        method: GET
        description: Docusign Returns envelope form data for an existing envelope.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: envelopeId
          in: path
          type: string
          description: The envelope's GUID. Eg 93be49ab-afa0-4adf-933c-f752070d71ec
          required: true
  exposes:
  - type: rest
    namespace: docusign-envelopeformdata-rest
    port: 8080
    description: REST adapter for DocuSign REST API — EnvelopeFormData. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/accounts/{accountid}/envelopes/{envelopeid}/form-data
      name: v2-accounts-accountid-envelopes-envelopeid-form-data
      description: REST surface for v2-accounts-accountId-envelopes-envelopeId-form_data.
      operations:
      - method: GET
        name: formdatagetformdata
        description: Docusign Returns envelope form data for an existing envelope.
        call: docusign-envelopeformdata.formdatagetformdata
        with:
          accountId: rest.accountId
          envelopeId: rest.envelopeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: docusign-envelopeformdata-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign REST API — EnvelopeFormData. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: docusign-returns-envelope-form-data
      description: Docusign Returns envelope form data for an existing envelope.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: docusign-envelopeformdata.formdatagetformdata
      with:
        accountId: tools.accountId
        envelopeId: tools.envelopeId
      outputParameters:
      - type: object
        mapping: $.
