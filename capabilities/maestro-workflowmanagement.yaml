    baseUri: https://apps.docusign.com/api/maestro
    description: Docusign Maestro API — WorkflowManagement business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounts-accountId-management-instances-instanceId-history
      path: /v1/accounts/{accountId}/management/instances/{instanceId}/history
      operations:
      - name: getworkflowhistory
        method: GET
        description: Docusign Gets the step history for a workflow instance.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: instanceId
          in: path
          type: string
          description: Workflow instance ID. <!-- dacid -->
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions
      path: /v1/accounts/{accountId}/management/workflow_definitions
      operations:
      - name: getworkflowdefinitions
        method: GET
        description: Docusign Gets a list of  workflow definition metadata.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: status
          in: query
          type: string
          description: Workflow definition metadata status. <!-- filter -->
      - name: createnewworkflowdefinition
        method: POST
        description: Docusign Creates a workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions-workflowDefinitionId
      path: /v1/accounts/{accountId}/management/workflow_definitions/{workflowDefinitionId}
      operations:
      - name: getworkflowdefinition
        method: GET
        description: Docusign Gets a workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: Workflow definition ID.
          required: true
        - name: lastDeployedId
          in: query
          type: string
          description: The ID of the deployed workflow definition.
      - name: updateworkflowdefinition
        method: PUT
        description: Docusign Updates a workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: Workflow definition ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteworkflowdefinition
        method: DELETE
        description: Docusign Deletes a workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: The ID of the workflow definition to delete.
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions-workflowDefinitionId-publi
      path: /v1/accounts/{accountId}/management/workflow_definitions/{workflowDefinitionId}/publish
      operations:
      - name: publishorunpublishworkflowdefinition
        method: POST
        description: Docusign Publishes or unpublishes a workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: Workflow definition ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOCUSIGN_API_KEY}}'
  exposes:
