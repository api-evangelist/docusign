naftiko: 1.0.0-alpha2
info:
  label: Docusign Maestro API — WorkflowManagement
  description: 'Docusign Maestro API — WorkflowManagement. 7 operations. Lead operation: Docusign Gets the step history for
    a workflow instance.. Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - WorkflowManagement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
