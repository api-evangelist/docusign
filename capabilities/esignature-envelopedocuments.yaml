naftiko: 1.0.0-alpha2
info:
  label: DocuSign eSignature REST API — EnvelopeDocuments
  description: 'DocuSign eSignature REST API — EnvelopeDocuments. 2 operations. Lead operation: Docusign List Envelope Documents.
    Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - EnvelopeDocuments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: esignature-envelopedocuments
    baseUri: https://demo.docusign.net/restapi/v2.1
    description: DocuSign eSignature REST API — EnvelopeDocuments business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-envelopes-envelopeId-documents
      path: /accounts/{accountId}/envelopes/{envelopeId}/documents
      operations:
      - name: envelopedocumentslistdocuments
        method: GET
        description: Docusign List Envelope Documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounts-accountId-envelopes-envelopeId-documents-documentId
      path: /accounts/{accountId}/envelopes/{envelopeId}/documents/{documentId}
      operations:
      - name: envelopedocumentsgetdocument
        method: GET
        description: Docusign Get an Envelope Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: documentId
          in: path
          type: string
          description: The unique identifier of the document within the envelope. Use "combined" to retrieve all documents
            as a single PDF.
          required: true
    authentication:
      type: bearer
      token: '{{env.DOCUSIGN_API_KEY}}'
  exposes:
  - type: rest
    namespace: esignature-envelopedocuments-rest
    port: 8080
    description: REST adapter for DocuSign eSignature REST API — EnvelopeDocuments. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/envelopes/{envelopeid}/documents
      name: accounts-accountid-envelopes-envelopeid-documents
      description: REST surface for accounts-accountId-envelopes-envelopeId-documents.
      operations:
      - method: GET
        name: envelopedocumentslistdocuments
        description: Docusign List Envelope Documents
        call: esignature-envelopedocuments.envelopedocumentslistdocuments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/envelopes/{envelopeid}/documents/{documentid}
      name: accounts-accountid-envelopes-envelopeid-documents-documentid
      description: REST surface for accounts-accountId-envelopes-envelopeId-documents-documentId.
      operations:
      - method: GET
        name: envelopedocumentsgetdocument
        description: Docusign Get an Envelope Document
        call: esignature-envelopedocuments.envelopedocumentsgetdocument
        with:
          documentId: rest.documentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: esignature-envelopedocuments-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign eSignature REST API — EnvelopeDocuments. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: docusign-list-envelope-documents
      description: Docusign List Envelope Documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: esignature-envelopedocuments.envelopedocumentslistdocuments
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-get-envelope-document
      description: Docusign Get an Envelope Document
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: esignature-envelopedocuments.envelopedocumentsgetdocument
      with:
        documentId: tools.documentId
      outputParameters:
      - type: object
        mapping: $.
