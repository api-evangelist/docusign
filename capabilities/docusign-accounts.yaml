naftiko: 1.0.0-alpha2
info:
  label: DocuSign REST API — Accounts
  description: 'DocuSign REST API — Accounts. 14 operations. Lead operation: Docusign Creates new accounts.. Self-contained
    Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: docusign-accounts
    baseUri: https://www.docusign.net/restapi
    description: DocuSign REST API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts
      path: /v2/accounts
      operations:
      - name: accountspostaccounts
        method: POST
        description: Docusign Creates new accounts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: preview_billing_plan
          in: query
          type: string
          description: When set to **true**, creates the account using a preview billing plan.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-provisioning
      path: /v2/accounts/provisioning
      operations:
      - name: accountsgetprovisioning
        method: GET
        description: Docusign Retrieves the account provisioning information for the account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-accounts-accountId
      path: /v2/accounts/{accountId}
      operations:
      - name: accountsgetaccount
        method: GET
        description: Docusign Retrieves the account information for the specified account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: include_account_settings
          in: query
          type: string
          description: When set to **true**, includes the account settings for the account in the response.
      - name: accountsdeleteaccount
        method: DELETE
        description: Docusign Deletes the specified account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
    - name: v2-accounts-accountId-billing_charges
      path: /v2/accounts/{accountId}/billing_charges
      operations:
      - name: billingchargesgetaccountbillingcharges
        method: GET
        description: Docusign Gets list of recurring and usage charges for the account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: include_charges
          in: query
          type: string
          description: Specifies which billing charges to return.
    - name: v2-accounts-accountId-captive_recipients-recipientPart
      path: /v2/accounts/{accountId}/captive_recipients/{recipientPart}
      operations:
      - name: captiverecipientsdeletecaptiverecipientspart
        method: DELETE
        description: Docusign Deletes the signature for one or more captive recipient records.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: recipientPart
          in: path
          type: string
          description: Signature is the only supported value.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-recipient_names
      path: /v2/accounts/{accountId}/recipient_names
      operations:
      - name: recipientnamesgetrecipientnames
        method: GET
        description: Docusign Gets recipient names associated with an email address.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: email
          in: query
          type: string
          description: The email address for the user
    - name: v2-accounts-accountId-settings
      path: /v2/accounts/{accountId}/settings
      operations:
      - name: settingsgetsettings
        method: GET
        description: Docusign Gets account settings information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
      - name: settingsputsettings
        method: PUT
        description: Docusign Updates the account settings for an account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-shared_access
      path: /v2/accounts/{accountId}/shared_access
      operations:
      - name: sharedaccessgetsharedaccess
        method: GET
        description: 'Docusign Reserved: Gets the shared item status for one or more users.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: count
          in: query
          type: string
          description: Specifies maximum number of results included in the response. If no value is specified, this defaults
            to 1000.
        - name: envelopes_not_shared_user_status
          in: query
          type: string
        - name: folder_ids
          in: query
          type: string
          description: A comma separated list of folder IDs  for which the shared item
        - name: item_type
          in: query
          type: string
          description: 'Specifies the type of shared item being requested. The possible values are:'
        - name: search_text
          in: query
          type: string
          description: This can be used to filter user names in the response. The wild-card '*' (asterisk) can be used around
            the string.
        - name: shared
          in: query
          type: string
          description: 'A comma-separated list of sharing filters that specifies which users appear in the response. '
        - name: start_position
          in: query
          type: string
          description: 'If the number of responses is greater than `count`, the number of responses to skip. Typically this
            value is a multiple of `count`. Default: 0.'
        - name: user_ids
          in: query
          type: string
          description: A comma-separated list of user IDs for whom the shared item information is being requested.
      - name: sharedaccessputsharedaccess
        method: PUT
        description: 'Docusign Reserved: Sets the shared access information for users.'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: item_type
          in: query
          type: string
          description: 'Specifies the type of shared item being requested. The possible values are:'
        - name: user_ids
          in: query
          type: string
          description: A comma-separated list of user IDs whose shared item information is being set.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-supported_languages
      path: /v2/accounts/{accountId}/supported_languages
