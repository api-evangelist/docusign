      path: /v2/accounts/{accountId}/groups/{groupId}/users
      operations:
      - name: groupsgetgroupusers
        method: GET
        description: Docusign Gets a list of users in a group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: groupId
          in: path
          type: string
          description: The ID of the group being accessed.
          required: true
        - name: count
          in: query
          type: string
          description: Number of records to return. The number must be greater than 1 and less than or equal to 100.
        - name: start_position
          in: query
          type: string
          description: Starting value for the list.
      - name: groupsputgroupusers
        method: PUT
        description: Docusign Adds one or more users to an existing group.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: groupId
          in: path
          type: string
          description: The ID of the group being accessed.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: groupsdeletegroupusers
        method: DELETE
        description: Docusign Deletes one or more users from a gro
