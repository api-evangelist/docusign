        destructive: false
        idempotent: true
      call: docusign-billingplans.billingplanputbillingplan
      with:
        accountId: tools.accountId
        preview_billing_plan: tools.preview_billing_plan
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-get-metadata-given-credit
      description: Docusign Get metadata for a given credit card.
      hints:
