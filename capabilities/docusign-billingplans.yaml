        include_metadata: tools.include_metadata
        include_successor_plans: tools.include_successor_plans
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-updates-account-billing-plan
      description: Docusign Updates the account billing plan.
      hints:
