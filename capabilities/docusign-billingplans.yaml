      with:
        accountId: tools.accountId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-gets-list-available-billing
      description: Docusign Gets the list of available billing plans.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: docusign-billingplans.billingplansgetbillingplans
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-get-billing-plan-details
      description: Docusign Get the billing plan details.
      hints:
        readOnly: true
        destructive: false
