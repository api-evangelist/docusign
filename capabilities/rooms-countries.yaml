naftiko: 1.0.0-alpha2
info:
  label: DocuSign Rooms API - v2 — Countries
  description: 'DocuSign Rooms API - v2 — Countries. 1 operations. Lead operation: Docusign Gets countries.. Self-contained
    Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - Countries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rooms-countries
    baseUri: https://rooms.docusign.com/restapi
    description: DocuSign Rooms API - v2 — Countries business capability. Self-contained, no shared references.
    resources:
    - name: v2-countries
      path: /v2/countries
      operations:
      - name: countriesgetcountries
        method: GET
        description: Docusign Gets countries.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DOCUSIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rooms-countries-rest
    port: 8080
    description: REST adapter for DocuSign Rooms API - v2 — Countries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/countries
      name: v2-countries
      description: REST surface for v2-countries.
      operations:
      - method: GET
        name: countriesgetcountries
        description: Docusign Gets countries.
        call: rooms-countries.countriesgetcountries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rooms-countries-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign Rooms API - v2 — Countries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: docusign-gets-countries
      description: Docusign Gets countries.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rooms-countries.countriesgetcountries
      outputParameters:
      - type: object
        mapping: $.
