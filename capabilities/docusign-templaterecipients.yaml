      operations:
      - name: recipientsgettemplaterecipients
        method: GET
        description: Docusign Gets recipient information from a template.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: templateId
          in: path
          type: string
          description: The ID of the template being accessed.
          required: true
        - name: include_anchor_tab_locations
          in: query
          type: string
          description: When set to **true** and `include_tabs` is set to **true**, all tabs with anchor tab properties are
            included in the response.
        - name: include_extended
          in: query
          type: string
          description: When set to **true**, the extended properties are included in the response.
        - name: include_tabs
          in: query
          type: string
          description: When set to **true**, the tab information associated with the recipient is included in the response.
