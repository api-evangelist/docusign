naftiko: 1.0.0-alpha2
info:
  label: DocuSign Rooms API - v2 — Currencies
  description: 'DocuSign Rooms API - v2 — Currencies. 1 operations. Lead operation: Docusign Gets valid currencies.. Self-contained
    Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - Currencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rooms-currencies
    baseUri: https://rooms.docusign.com/restapi
    description: DocuSign Rooms API - v2 — Currencies business capability. Self-contained, no shared references.
    resources:
    - name: v2-currencies
      path: /v2/currencies
      operations:
      - name: currenciesgetcurrencies
        method: GET
        description: Docusign Gets valid currencies.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.DOCUSIGN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rooms-currencies-rest
    port: 8080
    description: REST adapter for DocuSign Rooms API - v2 — Currencies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/currencies
      name: v2-currencies
      description: REST surface for v2-currencies.
      operations:
      - method: GET
        name: currenciesgetcurrencies
        description: Docusign Gets valid currencies.
        call: rooms-currencies.currenciesgetcurrencies
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rooms-currencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign Rooms API - v2 — Currencies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: docusign-gets-valid-currencies
      description: Docusign Gets valid currencies.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rooms-currencies.currenciesgetcurrencies
      outputParameters:
      - type: object
        mapping: $.
