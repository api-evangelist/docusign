naftiko: 1.0.0-alpha2
info:
  label: DocuSign REST API — ConnectEvents
  description: 'DocuSign REST API — ConnectEvents. 8 operations. Lead operation: Docusign Republishes Connect information
    for multiple envelopes.. Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - ConnectEvents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
