  - type: http
    namespace: docusign-connectevents
    baseUri: https://www.docusign.net/restapi
    description: DocuSign REST API — ConnectEvents business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-accountId-connect-envelopes-retry_queue
      path: /v2/accounts/{accountId}/connect/envelopes/retry_queue
      operations:
      - name: connectpublishputconnectretry
        method: PUT
        description: Docusign Republishes Connect information for multiple envelopes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-connect-envelopes-envelopeId-retry_queue
      path: /v2/accounts/{accountId}/connect/envelopes/{envelopeId}/retry_queue
      operations:
      - name: connectpublishputconnectretrybyenvelope
        method: PUT
        description: Docusign Republishes Connect information for the specified envelope.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: envelopeId
          in: path
          type: string
          description: The envelope's GUID. Eg 93be49ab-afa0-4adf-933c-f752070d71ec
          required: true
    - name: v2-accounts-accountId-connect-failures
      path: /v2/accounts/{accountId}/connect/failures
      operations:
      - name: connectfailuresgetconnectlogs
        method: GET
        description: Docusign Gets the Connect failure log information.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: from_date
          in: query
          type: string
          description: Start of the search date range. Only returns templates created on or after this date/time. If no value
            is specified, there is no limit on the earliest date crea
        - name: to_date
          in: query
          type: string
          description: End of the search date range. Only returns templates created up to this date/time. If no value is provided,
            this defaults to the current date.
    - name: v2-accounts-accountId-connect-failures-failureId
      path: /v2/accounts/{accountId}/connect/failures/{failureId}
      operations:
      - name: connectfailuresdeleteconnectfailurelog
        method: DELETE
        description: Docusign Deletes a Connect failure log entry.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: failureId
          in: path
          type: string
          description: The ID of the failed connect log entry.
          required: true
    - name: v2-accounts-accountId-connect-logs
      path: /v2/accounts/{accountId}/connect/logs
      operations:
      - name: connectloggetconnectlogs
        method: GET
        description: Docusign Gets the Connect log.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: from_date
          in: query
          type: string
          description: Start of the search date range. Only returns templates created on or after this date/time. If no value
            is specified, there is no limit on the earliest date crea
        - name: to_date
          in: query
          type: string
          description: End of the search date range. Only returns templates created up to this date/time. If no value is provided,
            this defaults to the current date.
      - name: connectlogdeleteconnectlogs
        method: DELETE
        description: Docusign Gets a list of Connect log entries.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
    - name: v2-accounts-accountId-connect-logs-logId
      path: /v2/accounts/{accountId}/connect/logs/{logId}
      operations:
      - name: connectloggetconnectlog
        method: GET
        description: Docusign Get the specified Connect log entry.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: logId
          in: path
          type: string
          description: The ID of the connect log entry
          required: true
        - name: additional_info
          in: query
          type: string
          description: When true, the connectDebugLog information is included in the response.
      - name: connectlogdeleteconnectlog
        method: DELETE
        description: Docusign Deletes a specified Connect log entry.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: logId
          in: path
          type: string
          description: The ID of the connect log entry
          required: true
