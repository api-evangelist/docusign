naftiko: 1.0.0-alpha2
info:
  label: DocuSign REST API — EnvelopeDocumentTabs
  description: 'DocuSign REST API — EnvelopeDocumentTabs. 2 operations. Lead operation: Docusign Returns tabs on the specified
    page.. Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - EnvelopeDocumentTabs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: docusign-envelopedocumenttabs
    baseUri: https://www.docusign.net/restapi
    description: DocuSign REST API — EnvelopeDocumentTabs business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-accountId-envelopes-envelopeId-documents-documentId-pages-pageNumber
      path: /v2/accounts/{accountId}/envelopes/{envelopeId}/documents/{documentId}/pages/{pageNumber}/tabs
      operations:
      - name: tabsgetpagetabs
        method: GET
        description: Docusign Returns tabs on the specified page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: documentId
          in: path
          type: string
          description: The ID of the document being accessed.
          required: true
        - name: envelopeId
          in: path
          type: string
          description: The envelope's GUID. Eg 93be49ab-afa0-4adf-933c-f752070d71ec
          required: true
        - name: pageNumber
          in: path
          type: string
          description: The page number being accessed.
          required: true
    - name: v2-accounts-accountId-envelopes-envelopeId-documents-documentId-tabs
      path: /v2/accounts/{accountId}/envelopes/{envelopeId}/documents/{documentId}/tabs
      operations:
      - name: tabsgetdocumenttabs
        method: GET
        description: Docusign Returns tabs on the document.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: documentId
          in: path
          type: string
          description: The ID of the document being accessed.
          required: true
        - name: envelopeId
          in: path
          type: string
          description: The envelope's GUID. Eg 93be49ab-afa0-4adf-933c-f752070d71ec
          required: true
        - name: page_numbers
          in: query
          type: string
  exposes:
  - type: rest
    namespace: docusign-envelopedocumenttabs-rest
    port: 8080
    description: REST adapter for DocuSign REST API — EnvelopeDocumentTabs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/accounts/{accountid}/envelopes/{envelopeid}/documents/{documentid}/pages/{pagenumber}/tabs
      name: v2-accounts-accountid-envelopes-envelopeid-documents-documentid-pages-pagenumber
      description: REST surface for v2-accounts-accountId-envelopes-envelopeId-documents-documentId-pages-pageNumber.
      operations:
      - method: GET
        name: tabsgetpagetabs
        description: Docusign Returns tabs on the specified page.
        call: docusign-envelopedocumenttabs.tabsgetpagetabs
        with:
          accountId: rest.accountId
          documentId: rest.documentId
          envelopeId: rest.envelopeId
          pageNumber: rest.pageNumber
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/accounts/{accountid}/envelopes/{envelopeid}/documents/{documentid}/tabs
      name: v2-accounts-accountid-envelopes-envelopeid-documents-documentid-tabs
      description: REST surface for v2-accounts-accountId-envelopes-envelopeId-documents-documentId-tabs.
      operations:
      - method: GET
        name: tabsgetdocumenttabs
        description: Docusign Returns tabs on the document.
        call: docusign-envelopedocumenttabs.tabsgetdocumenttabs
        with:
          accountId: rest.accountId
          documentId: rest.documentId
          envelopeId: rest.envelopeId
          page_numbers: rest.page_numbers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: docusign-envelopedocumenttabs-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign REST API — EnvelopeDocumentTabs. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: docusign-returns-tabs-specified-page
      description: Docusign Returns tabs on the specified page.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: docusign-envelopedocumenttabs.tabsgetpagetabs
      with:
        accountId: tools.accountId
        documentId: tools.documentId
        envelopeId: tools.envelopeId
        pageNumber: tools.pageNumber
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-returns-tabs-document
      description: Docusign Returns tabs on the document.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: docusign-envelopedocumenttabs.tabsgetdocumenttabs
      with:
        accountId: tools.accountId
        documentId: tools.documentId
        envelopeId: tools.envelopeId
        page_numbers: tools.page_numbers
      outputParameters:
      - type: object
        mapping: $.
