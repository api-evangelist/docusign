          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: Workflow definition ID.
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions-workflowDefinitionId-insta
      path: /v1/accounts/{accountId}/management/workflow_definitions/{workflowDefinitionId}/instances
      operations:
      - name: getworkflowinstances
        method: GET
        description: Docusign Get a list of instances of a deployed workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: workflowDefinitionId
          in: path
          type: string
          description: The ID of the workflow definition to delete.
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions-workflowDefinitionId-insta
      path: /v1/accounts/{accountId}/management/workflow_definitions/{workflowDefinitionId}/instances/{instanceId}
      operations:
      - name: getworkflowinstance
        method: GET
        description: Docusign Gets the details for a specific instance for a deployed workflow definition.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
