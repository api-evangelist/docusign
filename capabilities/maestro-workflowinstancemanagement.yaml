    - name: v1-accounts-accountId-management-instances-instanceId-cancel
      path: /v1/accounts/{accountId}/management/instances/{instanceId}/cancel
      operations:
      - name: cancelworkflowinstance
        method: POST
        description: Docusign Cancels a running workflow instance.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The account ID.
          required: true
        - name: instanceId
          in: path
          type: string
          description: The instance ID of the workflow to cancel.
          required: true
    - name: v1-accounts-accountId-management-workflow_definitions-workflowDefinitionId-confi
