naftiko: 1.0.0-alpha2
info:
  label: DocuSign Rooms API - v2 — Offices
  description: 'DocuSign Rooms API - v2 — Offices. 5 operations. Lead operation: Docusign Gets offices.. Self-contained Naftiko
