naftiko: 1.0.0-alpha2
info:
  label: DocuSign eSignature REST API — EnvelopeViews
  description: 'DocuSign eSignature REST API — EnvelopeViews. 2 operations. Lead operation: Docusign Create an Embedded Recipient
