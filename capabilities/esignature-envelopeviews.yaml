  - type: http
    namespace: esignature-envelopeviews
    baseUri: https://demo.docusign.net/restapi/v2.1
    description: DocuSign eSignature REST API — EnvelopeViews business capability. Self-contained, no shared references.
    resources:
    - name: accounts-accountId-envelopes-envelopeId-views-recipient
      path: /accounts/{accountId}/envelopes/{envelopeId}/views/recipient
      operations:
      - name: envelopeviewscreaterecipientview
        method: POST
        description: Docusign Create an Embedded Recipient Signing View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounts-accountId-envelopes-envelopeId-views-sender
      path: /accounts/{accountId}/envelopes/{envelopeId}/views/sender
      operations:
      - name: envelopeviewscreatesenderview
        method: POST
        description: Docusign Create an Embedded Sender View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOCUSIGN_API_KEY}}'
  exposes:
  - type: rest
    namespace: esignature-envelopeviews-rest
    port: 8080
    description: REST adapter for DocuSign eSignature REST API — EnvelopeViews. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/accounts/{accountid}/envelopes/{envelopeid}/views/recipient
      name: accounts-accountid-envelopes-envelopeid-views-recipient
      description: REST surface for accounts-accountId-envelopes-envelopeId-views-recipient.
      operations:
      - method: POST
        name: envelopeviewscreaterecipientview
        description: Docusign Create an Embedded Recipient Signing View
        call: esignature-envelopeviews.envelopeviewscreaterecipientview
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts/{accountid}/envelopes/{envelopeid}/views/sender
      name: accounts-accountid-envelopes-envelopeid-views-sender
      description: REST surface for accounts-accountId-envelopes-envelopeId-views-sender.
      operations:
      - method: POST
        name: envelopeviewscreatesenderview
        description: Docusign Create an Embedded Sender View
        call: esignature-envelopeviews.envelopeviewscreatesenderview
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: esignature-envelopeviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for DocuSign eSignature REST API — EnvelopeViews. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: docusign-create-embedded-recipient-signing
      description: Docusign Create an Embedded Recipient Signing View
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: esignature-envelopeviews.envelopeviewscreaterecipientview
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: docusign-create-embedded-sender-view
      description: Docusign Create an Embedded Sender View
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: esignature-envelopeviews.envelopeviewscreatesenderview
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
