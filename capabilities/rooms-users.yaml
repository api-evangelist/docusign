naftiko: 1.0.0-alpha2
info:
  label: DocuSign Rooms API - v2 — Users
  description: 'DocuSign Rooms API - v2 — Users. 12 operations. Lead operation: Docusign Gets a list of users.. Self-contained
    Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: rooms-users
    baseUri: https://rooms.docusign.com/restapi
    description: DocuSign Rooms API - v2 — Users business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-accountId-users
      path: /v2/accounts/{accountId}/users
      operations:
      - name: usersgetusers
        method: GET
        description: Docusign Gets a list of users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: 'Filters results by name and email address. This is a  "starts with" filter, which means that you can
            enter only the beginning of a name or email address. '
        - name: sort
          in: query
          type: string
          description: 'Specifies how to sort the results. Valid values are:'
        - name: defaultOfficeId
          in: query
          type: integer
          description: Filters for users who have this office ID as their default office ID.
        - name: accessLevel
          in: query
          type: string
          description: Filters for users who have the specified access level. A user's access level and role determine the
            types of resources and actions that are available to them.
        - name: titleId
          in: query
          type: integer
          description: This field is deprecated in Rooms Version 6.
        - name: roleId
          in: query
          type: integer
          description: Filters for users who have the specified `roleId`.
        - name: status
          in: query
          type: string
          description: Filters for users who have the specified `status`.
        - name: lockedOnly
          in: query
          type: boolean
          description: When **true,** filters for users whose accounts are locked.
        - name: startPosition
          in: query
          type: integer
          description: The starting zero-based index position within the result set from which to begin the response. The
            default is `0`.
        - name: count
          in: query
          type: integer
          description: The maximum number of users to return in the response. This value must be a number between `1` and
            `100` (default).
        - name: accountId
          in: path
          type: string
          description: The globally unique identifier (GUID) for the account.
          required: true
    - name: v2-accounts-accountId-users-invite_user
      path: /v2/accounts/{accountId}/users/invite_user
      operations:
      - name: usersinviteuser
        method: POST
        description: Docusign Invites a user to a company account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The globally unique identifier (GUID) for the account.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-users-userId
      path: /v2/accounts/{accountId}/users/{userId}
      operations:
      - name: usersgetuser
        method: GET
        description: Docusign Gets a user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: integer
          description: The ID of the user.
          required: true
        - name: accountId
          in: path
          type: string
          description: The globally unique identifier (GUID) for the account.
          required: true
      - name: usersupdateuser
        method: PUT
        description: Docusign Updates a user's default office.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: integer
          description: The ID of the user to update.
          required: true
        - name: accountId
          in: path
          type: string
          description: The globally unique identifier (GUID) for the account.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: usersremoveuser
        method: DELETE
        description: Docusign Removes a user from a company account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: integer
          description: The ID of the user to remove.
          required: true
        - name: accountId
          in: path
          type: string
          description: The globally unique identifier (GUID) for the account.
          required: true
    - name: v2-accounts-accountId-users-userId-add_to_office
      path: /v2/accounts/{accountId}/users/{userId}/add_to_office
      operations:
      - name: usersaddusertooffice
        method: POST
        description: Docusign Adds a user to an office.
        outputRawFormat: json
        outputParameters:
