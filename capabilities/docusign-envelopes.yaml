        - name: cdse_mode
          in: query
          type: string
          description: Reserved for DocuSign.
        - name: change_routing_order
          in: query
          type: string
          description: When true, users can define the routing order of recipients while sending documents for signature.
        - name: completed_documents_only
          in: query
          type: string
          description: Reserved for DocuSign.
