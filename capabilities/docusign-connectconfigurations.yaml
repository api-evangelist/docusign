naftiko: 1.0.0-alpha2
info:
  label: DocuSign REST API — ConnectConfigurations
  description: 'DocuSign REST API — ConnectConfigurations. 6 operations. Lead operation: Docusign Get Connect Configuration
    Information. Self-contained Naftiko capability covering one Docusign business surface.'
  tags:
  - Docusign
  - ConnectConfigurations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUSIGN_API_KEY: DOCUSIGN_API_KEY
capability:
  consumes:
  - type: http
    namespace: docusign-connectconfigurations
    baseUri: https://www.docusign.net/restapi
    description: DocuSign REST API — ConnectConfigurations business capability. Self-contained, no shared references.
    resources:
    - name: v2-accounts-accountId-connect
      path: /v2/accounts/{accountId}/connect
      operations:
      - name: connectgetconnectconfigs
        method: GET
        description: Docusign Get Connect Configuration Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
      - name: connectputconnectconfiguration
        method: PUT
        description: Docusign Updates a specified Connect configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: connectpostconnectconfiguration
        method: POST
        description: Docusign Creates a connect configuration for the specified account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v2-accounts-accountId-connect-connectId
      path: /v2/accounts/{accountId}/connect/{connectId}
      operations:
      - name: connectgetconnectconfig
        method: GET
        description: Docusign Get information on a Connect Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: connectId
          in: path
          type: string
          description: The ID of the custom Connect configuration being accessed.
          required: true
      - name: connectdeleteconnectconfig
        method: DELETE
        description: Docusign Deletes the specified connect configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: connectId
          in: path
          type: string
          description: The ID of the custom Connect configuration being accessed.
          required: true
    - name: v2-accounts-accountId-connect-connectId-users
      path: /v2/accounts/{accountId}/connect/{connectId}/users
      operations:
      - name: connectgetconnectusers
        method: GET
        description: Docusign Returns users from the configured Connect service.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          description: The external account number (int) or account id GUID.
          required: true
        - name: connectId
          in: path
          type: string
          description: The ID of the custom Connect configuration being accessed.
          required: true
        - name: count
          in: query
          type: string
          description: Optional. Number of items to return.
        - name: email_substring
          in: query
          type: string
          description: Filters the returned user records by the email address or a sub-string of email address.
        - name: list_included_users
          in: query
          type: string
        - name: start_position
          in: query
          type: string
          description: The position within the total result set from which to start returning values. The value **thumbnail**
            may be used to return the page image.
        - name: status
          in: query
          type: string
          description: Filters the results by user status.
        - name: user_name_substring
          in: query
          type: string
          description: Filters the user records returned by the user name or a sub-string of user name.
  exposes:
  - type: rest
    namespace: docusign-connectconfigurations-rest
    port: 8080
    description: REST adapter for DocuSign REST API — ConnectConfigurations. One Spectral-compliant resource per consumed
