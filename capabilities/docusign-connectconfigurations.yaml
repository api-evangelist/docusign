      operations:
      - method: GET
        name: connectgetconnectconfig
        description: Docusign Get information on a Connect Configuration
        call: docusign-connectconfigurations.connectgetconnectconfig
        with:
          accountId: rest.accountId
          connectId: rest.connectId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: connectdeleteconnectconfig
        description: Docusign Deletes the specified connect configuration.
        call: docusign-connectconfigurations.connectdeleteconnectconfig
        with:
          accountId: rest.accountId
          connectId: rest.connectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/accounts/{accountid}/connect/{connectid}/users
      name: v2-accounts-accountid-connect-connectid-users
      description: REST surface for v2-accounts-accountId-connect-connectId-users.
