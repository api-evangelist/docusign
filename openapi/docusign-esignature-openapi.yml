    TemplateRole:
      type: object
      description: >-
        Maps a recipient to a role defined in a template. Used when
        creating an envelope from a template.
      properties:
        name:
          type: string
          description: The recipient's full name.
        email:
          type: string
          format: email
          description: The recipient's email address.
        roleName:
          type: string
          description: >-
            The role name that matches a role defined in the template.
        clientUserId:
          type: string
          description: >-
            The client user ID for embedded signing.
        defaultRecipient:
          type: string
          description: When true, this is the default recipient for the role.
        routingOrder:
          type: string
          description: The routing order for the recipient.
        accessCode:
          type: string
          description: Access code for authentication.
        tabs:
          $ref: '#/components/schemas/EnvelopeRecipientTabs'
        emailNotification:
          $ref: '#/components/schemas/RecipientEmailNotification'

    CompositeTemplate:
      type: object
      description: >-
        A composite template that combines server templates and inline
        templates for complex envelope workflows.
      properties:
        compositeTemplateId:
          type: string
          description: Unique identifier for the composite template.
        serverTemplates:
          type: array
          items:
            type: object
            properties:
              templateId:
                type: string
              sequence:
                type: string
        inlineTemplates:
          type: array
          items:
            type: object
            properties:
              sequence:
                type: string
              recipients:
                $ref: '#/components/schemas/Recipients'
              documents:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        document:
          $ref: '#/components/schemas/Document'

    EnvelopeTemplate:
      type: object
      description: >-
        A template that defines reusable documents, recipients, tabs,
        and routing for envelope workflows.
      properties:
        templateId:
          type: string
          format: uuid
          description: The unique identifier of the template.
        uri:
          type: string
          description: The URI for the template.
        name:
          type: string
          description: The name of the template.
        description:
          type: string
          description: A description of the template.
        created:
          type: string
          format: date-time
          description: The date the template was created.
        lastModified:
          type: string
          format: date-time
          description: The date the template was last modified.
        lastUsed:
          type: string
          format: date-time
          description: The date the template was last used.
        shared:
          type: string
          description: Whether the template is shared.
        folderId:
          type: string
          description: The folder ID containing the template.
        folderName:
          type: string
          description: The name of the folder containing the template.
        owner:
          $ref: '#/components/schemas/UserInfo'
        emailSubject:
          type: string
          description: The default email subject for envelopes using this template.
        emailBlurb:
          type: string
          description: The default email body for envelopes using this template.
        signingLocation:
          type: string
          description: The signing location setting.
        documents:
          type: array
          description: The documents included in the template.
          items:
            $ref: '#/components/schemas/Document'
        recipients:
          $ref: '#/components/schemas/Recipients'
        notification:
          $ref: '#/components/schemas/Notification'
        customFields:
          $ref: '#/components/schemas/CustomFields'
        status:
          type: string
          description: Template status.

    EnvelopeTemplateResults:
      type: object
      description: Contains results of a template list request.
      properties:
        envelopeTemplates:
          type: array
          items:
