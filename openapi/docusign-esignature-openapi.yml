          description: The URI for the template.

    Notification:
      type: object
      description: Envelope notification settings including reminders and expirations.
      properties:
        useAccountDefaults:
          type: string
          description: When true, use account default notification settings.
        reminders:
          type: object
          properties:
            reminderEnabled:
              type: string
              description: When true, reminders are enabled.
            reminderDelay:
              type: string
              description: Days before the first reminder is sent.
            reminderFrequency:
              type: string
              description: Days between subsequent reminders.
        expirations:
          type: object
          properties:
            expireEnabled:
              type: string
              description: When true, expiration is enabled.
            expireAfter:
              type: string
              description: Days until the envelope expires.
            expireWarn:
              type: string
              description: Days before expiration to send a warning.

    CustomFields:
      type: object
      description: Envelope custom fields for metadata and integrations.
      properties:
        textCustomFields:
          type: array
          items:
            type: object
            properties:
              fieldId:
                type: string
              name:
                type: string
              value:
                type: string
              required:
                type: string
              show:
                type: string
        listCustomFields:
          type: array
          items:
            type: object
            properties:
              fieldId:
                type: string
              name:
                type: string
              value:
                type: string
              required:
                type: string
              show:
                type: string
              listItems:
                type: array
                items:
                  type: string

    EventNotification:
      type: object
      description: >-
        Configuration for envelope event notifications via DocuSign
        Connect webhooks.
      properties:
        url:
          type: string
          description: The webhook endpoint URL to receive notifications.
        loggingEnabled:
          type: string
          description: When true, Connect logging is enabled.
        requireAcknowledgment:
          type: string
          description: When true, requires HTTPS 200 acknowledgment.
        envelopeEvents:
          type: array
          description: Envelope-level events to trigger notifications.
          items:
            type: object
            properties:
              envelopeEventStatusCode:
                type: string
                enum:
                  - sent
                  - delivered
                  - completed
                  - declined
                  - voided
              includeDocuments:
                type: string
        recipientEvents:
          type: array
          description: Recipient-level events to trigger notifications.
          items:
            type: object
            properties:
              recipientEventStatusCode:
                type: string
                enum:
                  - Sent
                  - Delivered
                  - Completed
                  - Declined
                  - AuthenticationFailed
                  - AutoResponded
              includeDocuments:
                type: string
        includeCertificateOfCompletion:
          type: string
          description: When true, includes the certificate of completion.
        includeDocuments:
          type: string
          description: When true, includes document PDFs in the notification.
        includeDocumentFields:
          type: string
          description: When true, includes document custom fields.
        includeHMAC:
          type: string
          description: When true, includes HMAC security headers.
        includeSenderAccountAsCustomField:
          type: string
        includeTimeZone:
          type: string
          description: When true, includes time zone information.
        includeCertificateWithSoap:
          type: string

    RecipientViewRequest:
      type: object
      description: >-
        Request body for generating an embedded recipient signing URL.
      required:
        - authenticationMethod
        - email
        - userName
        - returnUrl
      properties:
        authenticationMethod:
          type: string
          description: >-
            The authentication method used to verify the recipient.
            Must match the authentication method used when the
            recipient was added.
          enum:
            - None
            - Phone
            - KBA
            - IDCheck
            - Password
            - HTTPBasicAuth
            - PaperDocuments
            - HeaderAuthentication
            - SAML
            - SSO
        email:
          type: string
          format: email
          description: The email address of the recipient.
        userName:
          type: string
          description: The full name of the recipient.
        clientUserId:
          type: string
          description: The client user ID of the embedded signer.
        recipientId:
          type: string
          description: The recipient ID.
        returnUrl:
          type: string
          description: >-
            The URL to redirect the signer to after the signing
            session ends. DocuSign appends event query parameters.
        pingUrl:
          type: string
          description: >-
            A URL that DocuSign pings during the signing session
            to confirm the parent frame is active.
        pingFrequency:
          type: string
          description: Frequency in seconds for ping requests.
        frameAncestors:
          type: array
          description: >-
            URLs allowed to iframe the signing session (CSP
            frame-ancestors).
          items:
            type: string
        messageOrigins:
          type: array
          description: Origins allowed to receive postMessage events.
          items:
            type: string
        securityDomain:
          type: string
          description: The security domain for the signing session.

    ViewUrl:
      type: object
      description: Contains a URL for an embedded view.
      properties:
        url:
          type: string
          description: >-
            The URL for the embedded view. This URL is time-limited
            and should be used immediately.

    RecipientEmailNotification:
      type: object
      description: Custom email notification settings for a recipient.
      properties:
        emailSubject:
          type: string
          description: Custom email subject for this recipient.
        emailBody:
          type: string
          description: Custom email body for this recipient.
        supportedLanguage:
          type: string
          description: Language code for the notification.

    UserInfo:
      type: object
